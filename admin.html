<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Roblox Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8">Admin Panel</h1>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Add New Account</h2>
            <form id="account-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="username" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Level</label>
                        <input type="number" id="level" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Blox Fruits (comma-separated)</label>
                        <input type="text" id="fruits" placeholder="Dragon, Leopard, Spirit" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Belis</label>
                        <input type="number" id="belis" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
                        <input type="number" step="0.01" id="price" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
                    </div>
                </div>
                
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Add Account</button>
            </form>
        </div>
        
        <div class="mt-8 text-center">
            <a href="/" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Back to Marketplace</a>
        </div>
    </div>
    
    <script>
        document.getElementById('account-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const accountData = {
                username: document.getElementById('username').value,
                level: parseInt(document.getElementById('level').value),
                fruits: document.getElementById('fruits').value.split(',').map(f => f.trim()),
                belis: parseInt(document.getElementById('belis').value),
                price: parseFloat(document.getElementById('price').value),
                description: document.getElementById('description').value
            };
            
            try {
                const response = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(accountData),
                });
                
                if (response.ok) {
                    alert('Account added successfully!');
                    document.getElementById('account-form').reset();
                } else {
                    alert('Failed to add account');
                }
            } catch (error) {
                console.error('Error adding account:', error);
                alert('Error adding account');
            }
        });
    </script>
</body>
</html>
